# =========================================
# Development Compose Overrides
# =========================================
# Extends compose.yml with development-specific configuration.
#
# Usage: docker compose -f compose.yml -f compose.dev.yml up -d

services:
  # -----------------------------------------
  # PostgreSQL - expose port for local tools
  # -----------------------------------------
  postgres:
    ports:
      - "${DB_PORT:-5432}:5432"


  # -----------------------------------------
  # PHP-FPM (Development)
  # -----------------------------------------
  php-fpm:
    build:
      context: ./backend
      dockerfile: docker/common/php-fpm/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-true}
        XDEBUG_MODE: ${XDEBUG_MODE:-develop,coverage,debug}
        XDEBUG_HOST: ${XDEBUG_HOST:-host.docker.internal}
        XDEBUG_IDE_KEY: ${XDEBUG_IDE_KEY:-DOCKER}
    env_file:
      - ./backend/.env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # -----------------------------------------
  # Nginx (Development - backend)
  # -----------------------------------------
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./backend:/var/www
      - ./backend/docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${BACKEND_PORT:-8000}:80"
    depends_on:
      - php-fpm
    networks:
      - app-network

  # -----------------------------------------
  # Frontend (Vite Dev Server with HMR)
  # -----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - app-network

  # -----------------------------------------
  # Workspace (artisan, tinker, testing, etc.)
  # -----------------------------------------
  workspace:
    build:
      context: ./backend
      dockerfile: docker/development/workspace/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    tty: true
    stdin_open: true
