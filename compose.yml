# =========================================
# Base Docker Compose Configuration
# =========================================
# This file defines shared services and infrastructure.
#
# Usage:
#   Development: docker compose --env-file backend/.env -f compose.yml -f compose.dev.yml up -d
#   Production:  docker compose --env-file backend/.env -f compose.yml -f compose.prod.yml up -d

name: event-manager

services:
  # -----------------------------------------
  # PostgreSQL Database
  # -----------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-event_manager}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-event_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
