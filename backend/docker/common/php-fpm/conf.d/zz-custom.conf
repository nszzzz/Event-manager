; =========================================
; Custom PHP-FPM Pool Configuration
; =========================================
; This file overrides the default www pool settings.

; Enable the status page for health checks
; The php-fpm-healthcheck script uses this endpoint.
pm.status_path = /status

; Make environment variables available to PHP-FPM workers.
; By default, FPM clears the environment, which prevents
; Laravel from reading Docker-injected env vars.
clear_env = no
